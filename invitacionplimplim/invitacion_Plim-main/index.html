<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
<!-- Fuente elegante para invitación -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <title>Invitación</title>
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            /* -----------------------
       ELIGE EL FONDO AQUÍ
       ----------------------- */
            background: #FDD835;
            /* gris de base */
            /* background-image: url('./img/frame-7162149_1280.png');*/
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            /* mantiene proporción */
            background-attachment: fixed;
        }
        
        .container {
            text-align: center;
            padding: 20px;
        }
        /* Imagen central responsiva */
        
        .container img {
            width: 50vw;
            /* máximo 50% del ancho de la ventana */
            max-width: 250px;
            /* nunca más de 250px de ancho */
            height: auto;
            /* mantiene proporción */
            border-radius: 10px;
            margin-bottom: 5px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        /* Botón dorado degradado */
        
        .container button {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(to right, hsl(60, 100%, 59%), #ebdd63);
            transition: 0.3s;
        }
        
        .container button:hover {
            background: linear-gradient(to right, hsl(0, 90%, 64%), #eb6363);
        }
        /* Sección de invitación responsiva */
        
        .invitacion {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            max-width: 90vw;
            /* se adapta a móviles */
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        
        .invitacion.show {
            display: block;
            opacity: 1;
        }
        
        .boton-dorado {
            display: inline-block;
            padding: 12px 35px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(to right, hsl(0, 100%, 50%), #ff0000);
            transition: 0.3s;
            text-align: center;
        }
        
        .boton-dorado:hover {
            background: linear-gradient(to right, hsl(0, 100%, 46%), #ff0000);
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Imagen central opcionalmente clicable -->
        <a href="invitacion.html">
            <img src="./img/mickeyregalo.png" alt="Invitación">
        </a>

        <br>

        <!-- Botón dorado que lleva a otra página -->
        <a href="invitacion.html" class="boton-dorado"> <h2>Ver invitación</h2></a>

        <!-- Ya no se necesita la sección invitación ni el script -->
    </div>
</body>


</html>
